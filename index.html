<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ISBNテスト</title>

<style>
body{
  font-family:sans-serif;
  padding:20px;
  background:#f5f1e8;
}

button{
  width:100%;
  padding:16px;
  margin-bottom:12px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#222;
  color:white;
}

video{
  width:100%;
  border-radius:12px;
  background:#000;
}

#isbn{
  margin-top:16px;
  padding:16px;
  background:white;
  border-radius:12px;
  font-size:22px;
  font-weight:bold;
}

#status{
  margin-top:12px;
}
</style>
</head>

<body>

<h1>ISBNバーコード実験</h1>

<button onclick="startScanner()">
📚 ISBNを読む
</button>

<video id="video" autoplay playsinline></video>

<div id="isbn">
ISBN未取得
</div>

<div id="status">
待機中
</div>

<hr>

<button onclick="getBooks()">
本一覧取得テスト
</button>

<div id="gasResult">
GAS未確認
</div>
  
<script>

let stream;

async function startScanner(){

  const status = document.getElementById('status');
  const video = document.getElementById('video');

  if(!('BarcodeDetector' in window)){
    status.textContent =
      'このブラウザは BarcodeDetector 非対応です';
    return;
  }

  try{

    const detector =
      new BarcodeDetector({
        formats:['ean_13']
      });

    stream =
      await navigator.mediaDevices.getUserMedia({
        video:{
          facingMode:'environment'
        }
      });

    video.srcObject = stream;

    status.textContent =
      'ISBNバーコードを映してください';

    scanLoop(detector);

  }catch(err){

    status.textContent =
      'エラー: ' + err.message;

  }
}

async function scanLoop(detector){

  const video = document.getElementById('video');

  try{

    const barcodes =
      await detector.detect(video);

   if(barcodes.length){

  const isbnCode = barcodes.find(barcode =>
    barcode.rawValue.startsWith('978') ||
    barcode.rawValue.startsWith('979')
  );

  if(!isbnCode){
    requestAnimationFrame(
      () => scanLoop(detector)
    );
    return;
  }

  const code = isbnCode.rawValue;

  document.getElementById('isbn')
    .textContent = code;

  document.getElementById('status')
    .textContent = '書誌情報取得中...';

  getBookInfo(code);

      if(stream){
        stream.getTracks()
          .forEach(track => track.stop());
      }

      return;
    }

  }catch(e){}

  requestAnimationFrame(
    () => scanLoop(detector)
  );
}

  async function getBookInfo(isbn){

  try{

    const response =
      await fetch(
        `https://api.openbd.jp/v1/get?isbn=${isbn}`
      );

    const data =
      await response.json();

    const book = data[0];

    if(!book){

      document.getElementById('status')
        .textContent =
        'openBDにデータがありません';

      return;
    }

    const cover =
      book.summary?.cover || '';

    const title =
      book.summary?.title || '';

    const author =
      book.summary?.author || '';

    const publisher =
      book.summary?.publisher || '';

    document.getElementById('status')
      .innerHTML =
      `
      ${cover ? `<img src="${cover}" style="width:140px;border-radius:8px;margin-bottom:16px;">` : ''}

      <b>タイトル</b><br>
      ${title}<br><br>

      <b>著者</b><br>
      ${author}<br><br>

      <b>出版社</b><br>
      ${publisher}
      `;

  }catch(error){

    document.getElementById('status')
      .textContent =
      'openBD取得失敗';
  }

}
  const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx_NMS07mrkNVrp3d-mATEBUOG8E3fnfbzSevRDNKM-YTiuwy8W0k1-S0Lftcq6UbxflA/exec';

async function getBooks(){

  const resultBox =
    document.getElementById('gasResult');

  resultBox.textContent =
    '本一覧取得中...';

  try{

    const response =
      await fetch(GAS_WEB_APP_URL, {
        method:'POST',
        body:JSON.stringify({
          type:'getBooks'
        })
      });

    const data =
      await response.json();

    resultBox.textContent =
      `取得件数: ${data.books.length}件`;

    console.log(data.books);

  }catch(error){

    resultBox.textContent =
      '取得失敗\n' + error.message;
  }
}
</script>

</body>
</html>
