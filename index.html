<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dokusyo camera test</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    padding: 20px;
    background: #f7f3ea;
    color: #222;
  }
  h1 {
    font-size: 22px;
  }
  button {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    border: none;
    border-radius: 14px;
    background: #222;
    color: white;
    margin: 12px 0;
  }
  video {
    width: 100%;
    max-height: 60vh;
    background: #000;
    border-radius: 16px;
    margin-top: 12px;
  }
  #status {
    white-space: pre-wrap;
    background: white;
    padding: 12px;
    border-radius: 12px;
    margin-top: 12px;
  }
</style>
</head>
<body>

<h1>dokusyo カメラ起動テスト</h1>

<button onclick="startCamera()">📷 カメラを起動</button>
<button onclick="stopCamera()">停止</button>

<video id="video" autoplay playsinline></video>

<div id="status">待機中</div>

<script>
let stream = null;

async function startCamera() {
  const status = document.getElementById('status');
  const video = document.getElementById('video');

  try {
    status.textContent = 'カメラ起動中...';

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' }
      },
      audio: false
    });

    video.srcObject = stream;
    status.textContent = 'カメラ起動成功！本の裏表紙を映す実験に進めそうです。';

  } catch (error) {
    status.textContent =
      'カメラ起動失敗\n\n' +
      error.name + '\n' +
      error.message + '\n\n' +
      'ブラウザのカメラ許可を確認してください。';
  }
}

function stopCamera() {
  const status = document.getElementById('status');
  const video = document.getElementById('video');

  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    stream = null;
  }

  video.srcObject = null;
  status.textContent = '停止しました';
}
</script>

</body>
</html>
