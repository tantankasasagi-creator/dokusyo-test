<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ISBNテスト</title>

<style>
body{
  font-family:sans-serif;
  padding:20px;
  background:#f5f1e8;
}

button{
  width:100%;
  padding:16px;
  margin-bottom:12px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#222;
  color:white;
}

video{
  width:100%;
  border-radius:12px;
  background:#000;
}

#isbn{
  margin-top:16px;
  padding:16px;
  background:white;
  border-radius:12px;
  font-size:22px;
  font-weight:bold;
}

#status{
  margin-top:12px;
}
</style>
</head>

<body>

<h1>ISBNバーコード実験</h1>

<button onclick="startScanner()">
📚 ISBNを読む
</button>

<video id="video" autoplay playsinline></video>

<div id="isbn">
ISBN未取得
</div>

<div id="status">
待機中
</div>

<script>

let stream;

async function startScanner(){

  const status = document.getElementById('status');
  const video = document.getElementById('video');

  if(!('BarcodeDetector' in window)){
    status.textContent =
      'このブラウザは BarcodeDetector 非対応です';
    return;
  }

  try{

    const detector =
      new BarcodeDetector({
        formats:['ean_13']
      });

    stream =
      await navigator.mediaDevices.getUserMedia({
        video:{
          facingMode:'environment'
        }
      });

    video.srcObject = stream;

    status.textContent =
      'ISBNバーコードを映してください';

    scanLoop(detector);

  }catch(err){

    status.textContent =
      'エラー: ' + err.message;

  }
}

async function scanLoop(detector){

  const video = document.getElementById('video');

  try{

    const barcodes =
      await detector.detect(video);

    if(barcodes.length){

      const code =
        barcodes[0].rawValue;

      document.getElementById('isbn')
        .textContent = code;

      document.getElementById('status')
        .textContent = '取得成功！';

      if(stream){
        stream.getTracks()
          .forEach(track => track.stop());
      }

      return;
    }

  }catch(e){}

  requestAnimationFrame(
    () => scanLoop(detector)
  );
}

</script>

</body>
</html>
